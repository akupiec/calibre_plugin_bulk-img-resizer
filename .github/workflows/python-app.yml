name: Python application

on:
  push:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Run commitlint
      uses: wagoid/commitlint-github-action@v6

    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: "3.12"
    - name: Run Tests
      run: |
        python -m unittest test_plugin.py